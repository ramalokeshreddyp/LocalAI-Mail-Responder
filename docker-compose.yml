version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_responder
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=UTC
      - NODE_ENV=production
      # Email credentials exposed as env vars for n8n credential injection
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASS=${IMAP_PASS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - ai_responder_net
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --proxy=off http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_responder
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai_responder_net
    # Uncomment the following section if you have an NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # One-shot init container that pulls the LLM model into Ollama on first run
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama_init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama to be ready..."
        until ollama list > /dev/null 2>&1; do
          sleep 5
        done
        echo "Pulling llama3:8b model..."
        OLLAMA_HOST=http://ollama:11434 ollama pull llama3:8b
        echo "Model pull complete."
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - ai_responder_net
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

volumes:
  n8n_data:
    driver: local
  ollama_data:
    driver: local

networks:
  ai_responder_net:
    driver: bridge
    name: ai_responder_net
